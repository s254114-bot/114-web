<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>槍枝技術百科 - 精準與工藝</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">FIREARM INFO</div>
            <ul>
                <li><a href="#">首頁</a></li>
                <li><a href="#">手槍</a></li>
                <li><a href="#">步槍</a></li>
                <li><a href="#">歷史與安全</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>經典步槍介紹：HK416</h1>
            <p>現代化戰術步槍的巔峰之作，兼具可靠性與精準度。</p>
        </section>

        <section class="content">
            <div class="weapon-card">
                <div class="weapon-image">
                    <img src="https://via.placeholder.com/600x300" alt="HK416 示意圖">
                </div>
                
                <div class="weapon-details">
                    <h2>技術參數</h2>
                    <table>
                        <tr>
                            <th>口徑</th>
                            <td>5.56 × 45mm NATO</td>
                        </tr>
                        <tr>
                            <th>槍管長度</th>
                            <td>264 / 368 / 419 / 505 mm</td>
                        </tr>
                        <tr>
                            <th>射速</th>
                            <td>700–900 發/分</td>
                        </tr>
                        <tr>
                            <th>有效射程</th>
                            <td>約 300 - 800 公尺</td>
                        </tr>
                    </table>
                </div>
            </div>

            <article class="description">
                <h3>運作原理</h3>
                <p>HK416 採用了<strong>短行程活塞傳動系統</strong>，這與傳統 M4 的直接導氣式不同，能大幅減少火藥殘渣進入機匣，提高在惡劣環境下的可靠性。</p>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 槍枝技術百科資料庫 | 僅供學術與愛好者研究使用</p>
    </footer>

</body>
</html>
