<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護廷十三隊 - 自我介紹</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="reiatsu-particles"></div>

    <div class="main-wrapper">
        <aside class="shinigami-profile">
            <div class="zanpakuto-icon">
                <img src="https://via.placeholder.com/150/000000/FFFFFF?text=BANKAI" alt="斬魄刀" class="avatar">
            </div>
            <h1 class="shinigami-name">你的姓名</h1>
            <p class="division-tag">護廷十三隊 • [某某]番隊</p>
            
            <div class="zanpakuto-info">
                <span class="label">斬魄刀名：</span>
                <span class="value">[刀的名字]</span>
            </div>

            <div class="soul-status">
                <span class="status-icon active"></span> 靈壓穩定
            </div>
        </aside>

        <main class="story-content">
            <section class="bio-section">
                <h2>【前言】</h2>
                <p>「如果命運是輪盤，我們就是輾碎命運的齒輪。」</p>
                <p>你好，我是 [你的姓名]。專注於 [你的領域]，同時在戰鬥中尋找真實的自我。</p>
            </section>

            <section class="skills-section">
                <h2>【鬼道 & 解放】</h2>
                <div class="skill-tags">
                    <span>破道之九十：黑棺</span>
                    <span>縛道之八十一：斷空</span>
                    <span>卍解：[你的技能]</span>
                    <span>虛化控制</span>
                </div>
            </section>

            <section class="mission-section">
                <h2>【主要任務】</h2>
                <div class="mission-item">
                    <strong>🛡️ 現世守護：[你的專案 A]</strong>
                    <p>利用代碼與設計，守護數位世界的穩定。</p>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
