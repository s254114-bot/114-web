<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114 Web Labs - 霊圧、解和</title>
    
    <style>
        :root {
            --shinigami-black: #0a0a0a;
            --getsuga-blue: #00e5ff;
            --reiatsu-red: #ff003c;
            --blade-silver: #ffffff;
        }

        body {
            background-color: var(--shinigami-black);
            color: var(--blade-silver);
            font-family: 'Noto Serif TC', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 背景微弱的靈子流動感 */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* 標題：帶有呼吸燈效果 */
        h1 {
            font-size: 4rem;
            letter-spacing: 12px;
            text-shadow: 0 0 15px var(--reiatsu-red);
            margin-bottom: 50px;
            animation: breath 3s infinite ease-in-out;
            transition: transform 0.5s ease;
        }

        h1:hover {
            transform: scale(1.1) skewX(-5deg);
            text-shadow: 0 0 30px var(--reiatsu-red), 0 0 5px #fff;
        }

        /* 導覽區域 */
        nav ul {
            list-style: none;
            padding: 0;
            text-align: center;
        }

        nav li {
            margin: 25px 0;
            /* 讓每個選項進場時有延遲感 */
            animation: slideIn 0.8s ease forwards;
            opacity: 0;
        }

        nav li:nth-child(1) { animation-delay: 0.2s; }
        nav li:nth-child(2) { animation-delay: 0.4s; }
        nav li:nth-child(3) { animation-delay: 0.6s; }

        /* 連結本體：轉場核心 */
        nav a {
            text-decoration: none;
            color: var(--blade-silver);
            font-size: 1.5rem;
            font-weight: bold;
            padding: 12px 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            position: relative;
            /* 轉場設定：所有屬性變化都要 0.4 秒平滑過渡 */
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }

        /* 滑鼠移上去的「始解」效果 */
        nav a:hover {
            color: var(--getsuga-blue);
            border-color: var(--getsuga-blue);
            letter-spacing: 4px; /* 文字撐開感 */
            transform: translateX(10px) skewX(-10deg);
            box-shadow: -15px 0 30px rgba(0, 229, 255, 0.2);
        }

        /* 裝飾線：斬擊動畫 */
        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        nav a:hover::before {
            left: 100%; /* 閃光劃過效果 */
        }

        /* 動畫定義 */
        @keyframes breath {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 10px var(--reiatsu-red); }
            50% { opacity: 1; text-shadow: 0 0 25px var(--reiatsu-red); }
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 點擊時的瞬間縮放 (視覺回饋) */
        nav a:active {
            transform: scale(0.9) skewX(-10deg);
            filter: brightness(1.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>114 Web Labs</h1>
    </header>

    <nav>
        <ul>
            <li><a href="lab1/lab1.html">第一号・黑腔</a></li>
            <li><a href="lab2/lab2.html">第二号・斬魄</a></li>
            <li><a href="lab3/lab3.html">第三号・解和</a></li>
            <li><a href="lab4/lab4.html">第N4号・歸刃</a></li>
        </ul>
    </nav>

</body>
</html>
